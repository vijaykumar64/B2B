services:
  # ── Backend Web Service ───────────────────────────────────────────
  - type: web
    name: scaleup-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false          # set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false          # set to your frontend URL e.g. https://b2b-6.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: LOG_LEVEL
        value: info

  # ── Frontend Static Site ──────────────────────────────────────────
  - type: web
    name: scaleup-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend URL e.g. https://scaleup-backend.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
